<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テスト：天平文化</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Meiryo",sans-serif;background:#f0f2f5;min-height:100vh;padding:20px 16px 80px}
  .back-btn{display:inline-flex;align-items:center;gap:6px;background:#2c3e8c;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:bold;cursor:pointer;margin-bottom:20px;text-decoration:none}
  .back-btn:hover{background:#1e2d6b}
  h1{text-align:center;font-size:22px;color:#1a1a2e;margin-bottom:6px}
  .unit-label{text-align:center;color:#888;font-size:13px;margin-bottom:24px}
  .card{max-width:720px;margin:0 auto 20px;background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.07);border:1px solid #e5e8f0}
  .q-num{font-size:12px;color:#5b4a8c;font-weight:bold;margin-bottom:8px}
  .q-text{font-size:17px;color:#1a1a2e;line-height:1.7;margin-bottom:18px}
  .choices{display:flex;flex-direction:column;gap:10px}
  .choice{padding:12px 16px;border:2px solid #dde;border-radius:8px;cursor:pointer;font-size:15px;color:#333;transition:all .15s;background:#fafafa}
  .choice:hover{border-color:#5b4a8c;background:#f5f0ff}
  .choice.selected{border-color:#5b4a8c;background:#ede8ff;color:#3d2a8c;font-weight:bold}
  .choice.correct{border-color:#27ae60;background:#e8fff2;color:#1e8a4d;font-weight:bold}
  .choice.wrong{border-color:#e74c3c;background:#fff0ef;color:#c0392b}
  .choice.show-correct{border-color:#27ae60;background:#e8fff2;color:#1e8a4d}
  .footer{max-width:720px;margin:0 auto;display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
  .btn{padding:12px 28px;border-radius:10px;border:none;font-size:16px;font-weight:bold;cursor:pointer;transition:.15s}
  .btn-primary{background:#5b4a8c;color:#fff;box-shadow:0 3px 0 #3d3060}
  .btn-secondary{background:#6c757d;color:#fff;box-shadow:0 3px 0 #495057}
  #result-screen{display:none;max-width:720px;margin:0 auto;text-align:center}
  .result-card{background:#fff;border-radius:16px;padding:40px 24px;box-shadow:0 4px 20px rgba(0,0,0,.1);border:2px solid #e5e8f0}
  .result-score{font-size:72px;font-weight:bold;margin:10px 0}
  .result-score.pass{color:#1976d2}.result-score.fail{color:#e67e22}
  .result-msg{font-size:22px;font-weight:bold;margin-bottom:8px}
  .result-detail{font-size:15px;color:#888;margin-bottom:30px}
  .confetti-piece{position:fixed;width:10px;height:10px;top:-10px;opacity:0;animation:fall linear forwards;border-radius:2px;pointer-events:none;z-index:9999}
  @keyframes fall{0%{top:-10px;opacity:1;transform:rotate(0)}100%{top:110vh;opacity:.3;transform:rotate(720deg)}}
</style>
</head>
<body>
<a class="back-btn" href="rekishi.html">← 単元一覧に戻る</a>
<h1>🎯 テスト</h1>
<p class="unit-label">天平文化</p>
<div id="quiz-screen">
  <div id="questions-area"></div>
  <div class="footer">
    <button class="btn btn-secondary" onclick="location.href='rekishi.html'">中断して戻る</button>
    <button class="btn btn-primary" onclick="submitTest()">採点する</button>
  </div>
</div>
<div id="result-screen">
  <div class="result-card">
    <div id="result-msg" class="result-msg"></div>
    <div id="result-score" class="result-score"></div>
    <div id="result-detail" class="result-detail"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="retryTest()">もう一度挑戦</button>
      <button class="btn btn-primary" onclick="location.href='rekishi.html'">単元一覧へ戻る</button>
    </div>
  </div>
</div>
<script>
const UNIT_ID='nara2',PASS_SCORE=70;
const questions=[{ q: '奈良時代の文化を何といいますか？', choices: ["飛鳥文化", "白鳳文化", "天平文化", "国風文化"], ans: 2 },
  { q: '唐の高僧で5回の渡航失敗と失明を乗り越えて来日した人物は誰ですか？', choices: ["空海", "最澄", "行基", "鑑真"], ans: 3 },
  { q: '鑑真が平城京に開いた寺はどれですか？', choices: ["東大寺", "法隆寺", "唐招提寺", "薬師寺"], ans: 2 },
  { q: '東大寺の倉庫でシルクロード経由の宝物が収められている施設は何ですか？', choices: ["御物蔵", "正倉院", "宝物殿", "法隆寺"], ans: 1 },
  { q: '唐に渡り唐の役人となって帰国できなかった遣唐使は誰ですか？', choices: ["小野妹子", "吉備真備", "阿倍仲麻呂", "菅原道真"], ans: 2 },
  { q: '712年に編集された神話や伝承をまとめた歴史書は何ですか？', choices: ["日本書紀", "万葉集", "古事記", "風土記"], ans: 2 },
  { q: '720年に中国の歴史書にならって編集された歴史書は何ですか？', choices: ["古事記", "万葉集", "日本書紀", "枕草子"], ans: 2 },
  { q: '日本最古の和歌集はどれですか？', choices: ["新古今和歌集", "古今和歌集", "万葉集", "百人一首"], ans: 2 },
  { q: '万葉集で使われた、漢字の音や訓で日本語を表す文字を何といいますか？', choices: ["かな文字", "万葉がな", "ひらがな", "カタカナ"], ans: 1 },
  { q: '天平文化の特徴として最も正しいものはどれですか？', choices: ["武士の文化", "唐・仏教の影響を受けた国際色豊かな文化", "日本独自の和風文化", "庶民の文化"], ans: 1 }];
let userAnswers=new Array(questions.length).fill(-1);
function renderQuestions(){const area=document.getElementById('questions-area');area.innerHTML='';questions.forEach((q,qi)=>{const card=document.createElement('div');card.className='card';card.innerHTML=`<div class="q-num">問題 ${qi+1} / ${questions.length}</div><div class="q-text">${q.q}</div><div class="choices" id="choices-${qi}">${q.choices.map((c,ci)=>`<div class="choice" onclick="selectChoice(${qi},${ci})"><span style="font-weight:bold;margin-right:8px">${['①','②','③','④'][ci]}</span>${c}</div>`).join('')}</div>`;area.appendChild(card);});}
function selectChoice(qi,ci){userAnswers[qi]=ci;document.querySelectorAll(`#choices-${qi} .choice`).forEach((el,i)=>el.classList.toggle('selected',i===ci));}
function submitTest(){let correct=0;questions.forEach((q,qi)=>{const ua=userAnswers[qi];document.querySelectorAll(`#choices-${qi} .choice`).forEach((el,ci)=>{if(ci===q.ans)el.classList.add('show-correct');if(ua===ci&&ci!==q.ans)el.classList.add('wrong');if(ua===ci&&ci===q.ans){el.classList.add('correct');correct++;}el.onclick=null;});});const score=Math.round(correct/questions.length*100),pass=score>=PASS_SCORE;try{const p=JSON.parse(localStorage.getItem('gamba_progress')||'{}');p[UNIT_ID]=p[UNIT_ID]||{};p[UNIT_ID].testScore=score;p[UNIT_ID].studyDone=true;localStorage.setItem('gamba_progress',JSON.stringify(p));}catch(e){}document.getElementById('quiz-screen').style.display='none';const rs=document.getElementById('result-screen');rs.style.display='block';const se=document.getElementById('result-score');se.textContent=score+'点';se.className='result-score '+(pass?'pass':'fail');document.getElementById('result-msg').textContent=pass?'🎉 合格！':'😅 おしい！';document.getElementById('result-detail').textContent=`${correct} / ${questions.length} 問正解（合格ライン：${PASS_SCORE}点）`;if(pass)launchConfetti();}
function retryTest(){userAnswers=new Array(questions.length).fill(-1);document.getElementById('result-screen').style.display='none';document.getElementById('quiz-screen').style.display='block';renderQuestions();window.scrollTo(0,0);}
function launchConfetti(){const colors=['#f43f5e','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#14b8a6'];for(let i=0;i<80;i++)setTimeout(()=>{const el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'vw';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.animationDuration=(1.5+Math.random()*2)+'s';el.style.width=(6+Math.random()*8)+'px';el.style.height=(6+Math.random()*8)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),4000);},i*30);}
renderQuestions();
</script>
</body>
</html>
